services:
  valhalla:
    image: ghcr.io/nilsnolde/docker-valhalla/valhalla:latest
    container_name: valhalla_cvale
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ../custom_files:/custom_files:rw
    environment:
      - tile_urls=
      - server_threads=2
      - serve_tiles=True
      - use_tiles_ignore_pbf=True
      - tileset_name=valhalla_tiles
      - build_elevation=False
      - build_admins=False
      - build_time_zones=False
      - build_tar=True
      - force_rebuild=False
      - update_existing_config=True
      - UID=${HOST_UID:-1000}
      - GID=${HOST_GID:-1000}
    mem_limit: 6G
    mem_reservation: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s